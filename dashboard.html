<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendSense AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-slate-800 font-sans">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded"><i class="fa-solid fa-layer-group"></i></div>
            <span class="font-bold text-xl">Trend<span class="text-indigo-600">Sense</span></span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- SECTION 1: VIRAL NOW -->
        <div class="mb-10">
            <h2 class="text-lg font-black text-slate-900 uppercase tracking-wide mb-4 flex items-center gap-2">
                <i class="fa-solid fa-fire text-rose-500"></i> Viral Opportunities
            </h2>
            <div id="hot-trends-container" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </div>

        <!-- SECTION 2: DEEP DIVE -->
        <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
            <div class="mb-6 border-b border-gray-100 pb-4">
                <h2 class="text-2xl font-bold text-slate-900">Deep Dive Analytics</h2>
                <p class="text-slate-500 text-sm">Select demographics to see global rankings. Click charts to drill down.</p>
            </div>
            
            <!-- FILTERS (No Product Filters!) -->
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-8 bg-gray-50 p-4 rounded-xl">
                <select id="f-region" class="p-2 border rounded text-sm font-medium"><option value="All">All Regions</option><option value="Europe">Europe</option><option value="North America">North America</option><option value="Asia">Asia</option></select>
                <select id="f-season" class="p-2 border rounded text-sm font-medium"><option value="All">All Seasons</option><option value="SS26">SS26 (Spring/Summer)</option><option value="FW26">FW26 (Fall/Winter)</option></select>
                <select id="f-gender" class="p-2 border rounded text-sm font-medium"><option value="All">All Genders</option><option value="FEMALE">Female</option><option value="MALE">Male</option></select>
                
                <!-- NEW: AGE FILTER -->
                <select id="f-age" class="p-2 border rounded text-sm font-medium">
                    <option value="All">All Ages</option>
                    <option value="18-24">18-24</option>
                    <option value="25-34">25-34</option>
                    <option value="35-44">35-44</option>
                    <option value="45-54">45-54</option>
                    <option value="55+">55+</option>
                </select>
                
                <button onclick="runAnalysis(null)" class="bg-slate-900 text-white font-bold py-2 rounded hover:bg-slate-700 transition">
                    Analyze
                </button>
            </div>

            <!-- MAIN LAYOUT -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- LEFT: Velocity Leaderboard (Interactive) -->
                <div class="lg:col-span-1 border-r border-gray-100 pr-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold text-slate-400 uppercase">Category Ranking</h3>
                        <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded">Click bar to inspect</span>
                    </div>
                    <div class="relative h-96 w-full">
                        <canvas id="chartA"></canvas>
                    </div>
                </div>

                <!-- RIGHT: Detailed Insights (Updates on Click) -->
                <div class="lg:col-span-2 pl-2">
                    <div class="flex items-center gap-3 mb-6 bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <div class="bg-white p-2 rounded shadow-sm">
                            <i class="fa-solid fa-magnifying-glass text-indigo-600"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Inspecting</p>
                            <h2 id="focus-title" class="text-xl font-black text-slate-900 leading-none">Loading...</h2>
                        </div>
                    </div>

                    <!-- ATTRIBUTE PILLS -->
                    <div class="grid grid-cols-3 gap-4 mb-8">
                        <div class="p-4 bg-white rounded-lg border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-rose-400 uppercase mb-1">Top Colors</p>
                            <p id="ins-color" class="text-sm font-bold text-slate-800">-</p>
                        </div>
                        <div class="p-4 bg-white rounded-lg border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-emerald-400 uppercase mb-1">Top Fabrics</p>
                            <p id="ins-fabric" class="text-sm font-bold text-slate-800">-</p>
                        </div>
                        <div class="p-4 bg-white rounded-lg border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-blue-400 uppercase mb-1">Top Styles</p>
                            <p id="ins-style" class="text-sm font-bold text-slate-800">-</p>
                        </div>
                    </div>

                    <!-- FORECAST CHART -->
                    <div>
                        <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">Demand Forecast</h3>
                        <div class="relative h-64 w-full">
                            <canvas id="chartB"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = "http://127.0.0.1:5001/api";
        let chartA = null, chartB = null;

        // 1. INIT
        async function init() {
            // Load Hot Trends
            const hotRes = await fetch(`${API}/hot_trends`);
            const hotData = await hotRes.json();
            const container = document.getElementById('hot-trends-container');
            
            hotData.forEach((item, idx) => {
                const colors = idx === 0 ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-800';
                container.innerHTML += `
                    <div class="${colors} p-4 rounded-xl shadow-sm">
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] uppercase font-bold opacity-70">#${idx+1} Trending</span>
                            <span class="text-xs font-bold">${item.score} Velocity</span>
                        </div>
                        <h4 class="font-black text-lg leading-tight mb-1">${item.name}</h4>
                        <p class="text-xs opacity-60">${item.tags.join(', ')}</p>
                    </div>
                `;
            });
            // Initial Run
            runAnalysis(null);
        }

        // 2. MAIN ANALYSIS FUNCTION
        async function runAnalysis(selectedCategory) {
            const payload = {
                region: document.getElementById('f-region').value,
                season: document.getElementById('f-season').value,
                gender: document.getElementById('f-gender').value,
                age_group: document.getElementById('f-age').value,
                selected_category: selectedCategory // Optional drill-down
            };

            try {
                const res = await fetch(`${API}/analyze`, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.error) { alert("No data found"); return; }
                
                updateUI(data);
            } catch(e) { console.error(e); }
        }

        function updateUI(data) {
            // Update Header
            document.getElementById('focus-title').innerText = data.selected_focus || "Overview";

            // Update Insights
            document.getElementById('ins-color').innerText = data.insights.colors.join(', ');
            document.getElementById('ins-fabric').innerText = data.insights.fabrics.join(', ');
            document.getElementById('ins-style').innerText = data.insights.styles.join(', ');

            // CHART A: Leaderboard (Horizontal Bar)
            const ctxA = document.getElementById('chartA').getContext('2d');
            if(chartA) chartA.destroy();
            
            chartA = new Chart(ctxA, {
                type: 'bar', indexAxis: 'y',
                data: {
                    labels: data.chart_velocity.labels,
                    datasets: [{
                        label: 'Velocity',
                        data: data.chart_velocity.scores,
                        backgroundColor: data.chart_velocity.labels.map(l => l === data.selected_focus ? '#4f46e5' : '#e2e8f0'),
                        borderRadius: 4,
                        barThickness: 20
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { grid: { display: false } } },
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const label = data.chart_velocity.labels[index];
                            // Trigger Drill-down
                            runAnalysis(label);
                        }
                    }
                }
            });

            // CHART B: Forecast (Line)
            const ctxB = document.getElementById('chartB').getContext('2d');
            if(chartB) chartB.destroy();
            chartB = new Chart(ctxB, {
                type: 'line',
                data: {
                    labels: data.chart_forecast.labels,
                    datasets: [{
                        label: 'Demand',
                        data: data.chart_forecast.values,
                        borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)', fill: true, tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } } } }
            });
        }

        init();
    </script>
</body>
</html>
